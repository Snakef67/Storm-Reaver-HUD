<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamer HUD V12 - Master Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0f172a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #map { height: 100%; width: 100%; z-index: 1; background: #000; }
        .sidebar { position: fixed; top: 0; bottom: 0; height: 100%; z-index: 2000; transition: transform 0.3s; background: #0f172a; }
        #sidebar-alerts { left: 0; transform: translateX(-100%); width: 280px; }
        #sidebar-alerts.open { transform: translateX(0); }
        #sidebar-tools { right: 0; transform: translateX(100%); width: 280px; }
        #sidebar-tools.open { transform: translateX(0); }
        @media (min-width: 768px) { .sidebar { position: relative; transform: none; } }
        #custom-popup { display: none; position: fixed; z-index: 3000; background: rgba(30, 41, 59, 0.95); border: 1px solid #475569; border-radius: 12px; }
        #custom-popup.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active-tab { display: flex; flex-direction: column; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full relative">
    <div id="map"></div>

    <script>
        // --- 1. CORE SETUP ---
        const apiKey = localStorage.getItem('gemini_key') || prompt("Enter Gemini API Key:");
        if(apiKey) localStorage.setItem('gemini_key', apiKey);

        let map, geojsonLayer;

        function initApp() {
            map = L.map('map', { zoomControl: false }).setView([42.9, -85.7], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 12 }).addTo(map);
            
            // Re-render warnings
            fetchAlerts();
            setInterval(fetchAlerts, 60000);
        }

        async function fetchAlerts() {
            try {
                const res = await fetch('https://api.weather.gov/alerts/active', { headers: { 'Cache-Control': 'no-cache' } });
                const data = await res.json();
                processPolygons(data.features.filter(f => f.geometry));
            } catch (e) { console.error("Sync error", e); }
        }

        function processPolygons(alerts) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            geojsonLayer = L.geoJSON(alerts, {
                style: { color: '#ff0000', weight: 2, fillOpacity: 0.1 },
                onEachFeature: (f, l) => { l.on('click', () => { /* Add your popup logic here */ }); }
            }).addTo(map);
        }

        // Run map immediately
        initApp();
    </script>
</body>
</html>
